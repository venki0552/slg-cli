name: Release
on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: lore-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: lore-linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: lore-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: lore-darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: lore-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: Rename binary to platform-specific name (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/lore ${{ matrix.name }}
      - name: Rename binary to platform-specific name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/${{ matrix.target }}/release/lore.exe ${{ matrix.name }}
      - name: Calculate checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum ${{ matrix.name }} > ${{ matrix.name }}.sha256
      - name: Calculate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash ${{ matrix.name }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.name }}" | Out-File -Encoding ascii ${{ matrix.name }}.sha256
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}
            ${{ matrix.name }}.sha256
