name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --all --all-features
      - name: Clippy
        run: cargo clippy --all -- -D warnings
      - name: Format check
        run: cargo fmt --all --check
      - name: Security audit
        run: |
          cargo install cargo-audit --locked
          cargo audit

  security_tests:
    runs-on: ubuntu-latest
    # Runs in parallel with test — never blocked
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run security invariant tests (NEVER SKIP)
        run: |
          cargo test -p slg-security --test test_injection
          cargo test -p slg-security --test test_secrets
          cargo test -p slg-security --test test_paths
          cargo test -p slg-security --test test_output

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Install and compile plugin
        working-directory: plugin
        run: |
          npm install
          npm run compile
